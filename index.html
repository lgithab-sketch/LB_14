<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Component Demo</title>
<style>
body{font-family:Arial;margin:30px}
button{margin:5px;padding:8px 12px}
.counter{border:1px solid #ccc;padding:15px;width:200px}
</style>
</head>
<body>

<div id="root"></div>

<script>

// ---------- БАЗОВИЙ КЛАС ----------
class Component {
  constructor(props = {}) {
    this.props = props
    this.state = {}
    this.root = null
    this.el = null
  }

  setState(patch) {
    this.state = { ...this.state, ...patch }
    this.update()
  }

  render() {
    throw new Error("render() must be implemented")
  }

  mount(root) {
    this.root = root

    if (!this.el) {
      this.el = document.createElement("div")
      this.el.className = "component"
    }

    this.root.appendChild(this.el)
    this.update()
  }

  update() {
    if (!this.el) return
    this.el.replaceChildren(this.render())
  }

  unmount() {
    if (this.el) this.el.remove()
    this.root = null
  }
}


// ---------- COUNTER COMPONENT ----------
class Counter extends Component {

  constructor(props){
    super(props)
    this.state = { count: props.initial ?? 0 }
  }

  render(){
    const box = document.createElement("div")
    box.className = "counter"

    const title = document.createElement("h3")
    title.textContent = this.props.label ?? "Counter"

    const value = document.createElement("p")
    value.textContent = "Count: " + this.state.count

    const minus = document.createElement("button")
    minus.textContent = "-"

    const plus = document.createElement("button")
    plus.textContent = "+"

    minus.addEventListener("click", ()=>{
      this.setState({ count: this.state.count - 1 })
    })

    plus.addEventListener("click", ()=>{
      this.setState({ count: this.state.count + 1 })
    })

    box.append(title,value,minus,plus)

    return box
  }
}


// ---------- APP COMPONENT ----------
class App extends Component {

  render(){
    const container = document.createElement("div")

    const title = document.createElement("h2")
    title.textContent = "Demo компонентів"

    container.appendChild(title)

    const counter = new Counter({
      label: "Clicks",
      initial: 0
    })

    const mountPoint = document.createElement("div")

    container.appendChild(mountPoint)

    // монтуємо Counter всередині App
    setTimeout(()=>{
      counter.mount(mountPoint)
    })

    return container
  }
}


// ---------- ЗАПУСК ----------
const app = new App()
app.mount(document.getElementById("root"))

</script>

</body>
</html>
